<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新商品発売タイミング管理</title>
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="app-header">
  <div class="header-left">
    <div class="app-icon">📦</div>
    <div>
      <div class="app-title">新商品発売タイミング管理</div>
      <div class="app-subtitle">3か月前 / 4か月前 案内スケジュール</div>
    </div>
  </div>
  <div class="header-right">
    <button class="nav-btn" id="btnLeft">&#8249;</button>
    <button class="nav-btn" id="btnRight">&#8250;</button>
    <button class="btn-add-main" id="btnAddMain" onclick="openAddModal()">
      <span style="font-size:16px;line-height:1">＋</span> 商品追加
    </button>
  </div>
</header>

<!-- ===== LOADING BAR ===== -->
<div class="loading-bar" id="loadingBar"></div>

<!-- ===== MONTH QUICK-NAV ===== -->
<div class="month-nav-bar" id="monthNav"></div>

<!-- ===== LEGEND ===== -->
<div class="legend-bar">
  <span class="legend-title">案内区分：</span>
  <div class="legend-item"><div class="cat-badge cb-1">①</div><span><strong>4か月前</strong> — チラシ準備可能</span></div>
  <div class="legend-item"><div class="cat-badge cb-2">②</div><span><strong>3か月前</strong> — 予測発注可能</span></div>
  <div class="legend-item"><div class="cat-badge cb-3">③</div><span><strong>3か月前</strong> — 予測不能・生産可</span></div>
  <div style="margin-left:auto;display:flex;gap:10px;align-items:center;">
    <span class="legend-title">チーム：</span>
    <div class="legend-item"><span class="team-badge team-A" style="width:20px;height:20px;border-radius:5px;font-size:11px;">A</span> チームA</div>
    <div class="legend-item"><span class="team-badge team-B" style="width:20px;height:20px;border-radius:5px;font-size:11px;">B</span> チームB</div>
    <div class="legend-item"><span class="team-badge team-C" style="width:20px;height:20px;border-radius:5px;font-size:11px;">C</span> チームC</div>
  </div>
</div>

<!-- ===== TIMELINE ===== -->
<div class="main-content">
  <div class="timeline" id="timeline"></div>
</div>

<!-- ===== MODAL ===== -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">商品を追加</div>
      <button class="btn-modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">

      <div class="form-group">
        <label class="form-label">商品名<span class="required">*</span></label>
        <input type="text" class="form-input" id="fName" placeholder="例：ミニチュアキッチン vol.5">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">発売月<span class="required">*</span></label>
          <select class="form-input" id="fRelease"></select>
        </div>
        <div class="form-group">
          <label class="form-label">上代（円）</label>
          <input type="number" class="form-input" id="fPrice" placeholder="500" min="0">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">BOX入数</label>
          <input type="number" class="form-input" id="fBox" placeholder="12" min="1">
        </div>
        <div class="form-group">
          <label class="form-label">CTN入数</label>
          <input type="number" class="form-input" id="fCtn" placeholder="48" min="1">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">担当者</label>
          <input type="text" class="form-input" id="fPerson" placeholder="例：山田 太郎">
        </div>
        <div class="form-group">
          <label class="form-label">チーム</label>
          <div class="team-options">
            <div class="team-opt" data-team="A" onclick="selectTeam('A')">
              <div class="team-opt-letter">A</div>
              <div class="team-opt-label">チームA</div>
            </div>
            <div class="team-opt" data-team="B" onclick="selectTeam('B')">
              <div class="team-opt-letter">B</div>
              <div class="team-opt-label">チームB</div>
            </div>
            <div class="team-opt" data-team="C" onclick="selectTeam('C')">
              <div class="team-opt-letter">C</div>
              <div class="team-opt-label">チームC</div>
            </div>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">案内区分<span class="required">*</span></label>
        <div class="cat-options">
          <div class="cat-opt" data-cat="1" onclick="selectCat(1)">
            <div class="cat-opt-num">①</div>
            <div class="cat-opt-desc">4か月前案内<br>チラシ準備可能</div>
          </div>
          <div class="cat-opt" data-cat="2" onclick="selectCat(2)">
            <div class="cat-opt-num">②</div>
            <div class="cat-opt-desc">3か月前案内<br>予測発注可能</div>
          </div>
          <div class="cat-opt" data-cat="3" onclick="selectCat(3)">
            <div class="cat-opt-num">③</div>
            <div class="cat-opt-desc">3か月前案内<br>予測不能・生産可</div>
          </div>
        </div>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-delete" id="btnDelete" style="display:none" onclick="confirmDelete()">削除</button>
      <button class="btn btn-save" id="btnSave" onclick="saveProduct()">保存する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
